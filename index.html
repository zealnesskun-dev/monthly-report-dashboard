<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>Monthly Report — ฝ่ายสิ่งแวดล้อมโครงการ (Single File)</title>

  <!-- Fonts: Sora (display Eng) + Bai Jamjuree (Thai มีหัว, modern friendly) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
/* ───────────────────────────────────────────────────────────
   Monthly Report Dashboard — ฝ่ายสิ่งแวดล้อมโครงการ
   Pastel Direction · v1.0 — bundled single-file build
─────────────────────────────────────────────────────────── */

:root {
  --bg: #f5efe5;
  --paper: #ffffff;
  --paper-2: #faf6ed;
  --ink: #15192a;
  --ink-2: #2a2f44;
  --ink-soft: #6c7282;
  --line: #ece5d5;
  --line-soft: #f1ece0;
  --c-sage:     #d6e4cd;
  --c-sage-d:   #88a376;
  --c-peach:    #f7d4bc;
  --c-peach-d:  #b5703f;
  --c-butter:   #fbe5a4;
  --c-butter-d: #997621;
  --c-pink:     #f4c8d4;
  --c-pink-d:   #a64664;
  --c-lavender: #ddd6ee;
  --c-lavender-d: #6b5fa3;
  --c-mint:     #c8e4d8;
  --c-mint-d:   #3b8a6a;
  --c-sky:      #cadce9;
  --c-sky-d:   #3e6b8a;
  --c-cream:    #f3ecdb;
  --c-cream-d:  #8a774a;
  --c-coral:    #f9c4ba;
  --c-coral-d:  #b85643;
  --ok: #2d7045;
  --ok-soft: #d4e5d8;
  --warn: #b53737;
  --warn-soft: #f1d3d3;
  --ff-display: "Sora", "Bai Jamjuree", system-ui, sans-serif;
  --ff-body: "Bai Jamjuree", "Sora", system-ui, sans-serif;
  --r-sm: 12px;
  --r:    20px;
  --r-lg: 28px;
  --r-xl: 36px;
  --canvas-w: 1920px;
  --gap: 20px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--ink);
  font-size: 17px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "kern" on;
}
[contenteditable="true"], h1, h2, h3, h4, .kpi-title, .kp-name, .kp-type,
.kpi-sub, .tl-row-name, .tl-row-meta, .tl-block-title, .tl-block-period,
.section-head .title, .ch-title, .ch-sub {
  padding-top: 0.05em;
}
button { font: inherit; cursor: pointer; background: none; border: 0; color: inherit; }
input, textarea { font: inherit; color: inherit; }

.app { min-height: 100vh; padding: 28px; display: flex; justify-content: center; }
.stage { width: 100%; max-width: var(--canvas-w); background: var(--paper); border-radius: var(--r-xl); box-shadow: 0 1px 0 rgba(20,25,42,0.03), 0 24px 60px rgba(20,25,42,0.06); overflow: hidden; }

.topbar { display: flex; align-items: center; gap: 18px; padding: 28px 40px 24px; }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo { width: 56px; height: 56px; border-radius: 18px; background: var(--ink); color: var(--paper); display: grid; place-items: center; font-family: var(--ff-display); font-weight: 800; font-size: 18px; letter-spacing: -0.01em; flex-shrink: 0; }
.brand-meta { line-height: 1.2; min-width: 0; }
.brand-meta .b1 { font-family: var(--ff-display); font-weight: 700; font-size: 19px; letter-spacing: -0.01em; }
.brand-meta .b2 { font-size: 13px; color: var(--ink-soft); margin-top: 3px; letter-spacing: 0.01em; }
.topbar-spacer { flex: 1; }
.status-legend { display: inline-flex; align-items: center; gap: 14px; padding: 8px 14px; background: var(--bg); border-radius: 999px; white-space: nowrap; }
.sl-item { display: inline-flex; align-items: center; gap: 7px; font-family: var(--ff-body); font-size: 12.5px; font-weight: 600; color: var(--ink-2); line-height: 1.4; }
.sl-item .sl-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.sl-item.ok .sl-dot { background: var(--ok); }
.sl-item.warn .sl-dot { background: var(--warn); }
.actions { display: flex; gap: 8px; align-items: center; }
.btn, .h-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px; border-radius: 999px; font-weight: 600; font-size: 14px; font-family: var(--ff-body); background: var(--bg); color: var(--ink); transition: all 0.12s ease; white-space: nowrap; border: 0; }
.btn:hover, .h-btn:hover { background: #ece5d5; }
.btn.primary, .h-btn.primary, .h-btn.gold { background: var(--ink); color: var(--paper); }
.btn.primary:hover, .h-btn.primary:hover, .h-btn.gold:hover { background: var(--ink-2); }
.btn .arr { width: 22px; height: 22px; background: var(--paper); color: var(--ink); border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 700; }
.h-btn .ico, .btn .ico { display: inline-flex; align-items: center; justify-content: center; font-family: var(--ff-display); font-weight: 700; font-size: 15px; width: 16px; }
.avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--c-peach), var(--c-coral)); display: grid; place-items: center; font-family: var(--ff-display); font-weight: 700; font-size: 16px; color: var(--ink); border: 2px solid var(--paper); box-shadow: 0 2px 8px rgba(20,25,42,0.1); flex-shrink: 0; }

.main-tabs { display: flex; gap: 6px; margin: 0 40px 18px; padding: 6px; background: var(--bg); border-radius: 999px; width: fit-content; flex-wrap: wrap; }
.main-tab { display: inline-flex; flex-direction: column; align-items: flex-start; padding: 11px 22px; border-radius: 999px; font-family: var(--ff-display); font-weight: 700; font-size: 16px; color: var(--ink-soft); transition: all 0.12s ease; line-height: 1.35; border: 0; cursor: pointer; background: transparent; }
.main-tab:hover { color: var(--ink); }
.main-tab.active { background: var(--ink); color: var(--paper); }
.main-tab .mt-short { font-family: var(--ff-display); font-weight: 700; font-size: 16px; display: block; line-height: 1; white-space: nowrap; }
.main-tab .mt-full { font-family: var(--ff-body); font-weight: 500; font-size: 11.5px; margin-top: 4px; opacity: 0.7; letter-spacing: 0.01em; display: block; white-space: nowrap; }
.main-tab.active .mt-full { opacity: 0.85; }

.sub-tabs-wrap { display: flex; gap: 6px; align-items: center; padding: 0 40px 22px; flex-wrap: wrap; background: transparent; border-bottom: 0; }
.sub-tab { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px 9px 16px; border-radius: 999px; font-weight: 600; font-size: 14px; color: var(--ink-soft); border: 0; background: transparent; cursor: pointer; transition: all 0.12s ease; user-select: none; position: relative; }
.sub-tab:hover { background: var(--bg); color: var(--ink); }
.sub-tab.active { background: var(--c-butter); color: var(--ink); }
.sub-tab.dragging { opacity: 0.4; }
.sub-tab.drag-over { box-shadow: -3px 0 0 var(--c-butter-d); }
.sub-tab .drag-handle { font-size: 11px; opacity: 0.4; cursor: grab; margin-right: -3px; }
.sub-tab .st-name { outline: none; }
.sub-tab .st-name[contenteditable="true"]:focus { background: var(--paper); color: var(--ink); padding: 2px 6px; border-radius: 6px; }
.sub-tab .st-close { background: transparent; color: currentColor; font-size: 15px; opacity: 0.55; padding: 0 0 0 4px; line-height: 1; }
.sub-tab .st-close:hover { opacity: 1; }
.add-sub { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: transparent; border: 1.5px dashed var(--ink-soft); color: var(--ink-soft); font-weight: 600; font-size: 13px; border-radius: 999px; cursor: pointer; }
.add-sub:hover { border-color: var(--ink); color: var(--ink); }

.toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 14px; margin: 0 40px 24px; background: var(--bg); border-radius: 999px; border: 0; width: fit-content; max-width: calc(100% - 80px); flex-wrap: wrap; }
.toolbar-label { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); font-weight: 700; margin: 0 10px 0 8px; }
.tb-btn { display: inline-flex; align-items: center; gap: 7px; padding: 7px 13px; background: var(--paper); color: var(--ink); font-weight: 600; font-size: 13.5px; border-radius: 999px; transition: all 0.12s ease; border: 0; cursor: pointer; }
.tb-btn:hover { background: var(--ink); color: var(--paper); }
.tb-btn .ico { display: inline-flex; align-items: center; justify-content: center; font-family: var(--ff-display); font-weight: 700; font-size: 14px; width: 14px; }
.toolbar-spacer { flex: 1; min-width: 16px; }
.toolbar-toggle { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink); font-weight: 600; padding: 0 12px 0 8px; cursor: pointer; }
.toolbar-toggle input { accent-color: var(--ink); width: 16px; height: 16px; }

.canvas { padding: 0 40px 60px; background: transparent; min-height: 600px; }
.canvas-period { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 28px; padding: 18px 28px; background: var(--c-cream); border-radius: var(--r); }
.canvas-period .left { font-family: var(--ff-display); font-weight: 700; font-size: 22px; letter-spacing: -0.01em; }
.canvas-period .left small { display: block; font-family: var(--ff-body); font-weight: 600; font-size: 12px; color: var(--ink-soft); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.canvas-period .right { font-size: 13px; color: var(--ink-soft); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }

.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: var(--gap); }
.grid-item { position: relative; }
.grid-item.dragging { opacity: 0.35; }
.grid-item.drag-over::before { content: ""; position: absolute; inset: -8px; border: 2px dashed var(--c-butter-d); border-radius: var(--r-lg); pointer-events: none; }
.grid-item.hidden-obj { opacity: 0.45; }
.grid-item.hidden-obj .obj-inner { filter: grayscale(0.5); }
.obj-inner { position: relative; height: 100%; }
.edit .grid-item:hover .obj-handle { opacity: 1; pointer-events: auto; }
.obj-handle { position: absolute; top: -10px; right: -8px; display: flex; gap: 4px; z-index: 5; opacity: 0; transition: opacity 0.12s ease; pointer-events: none; }
.obj-handle button { width: 28px; height: 28px; border-radius: 8px; background: var(--ink); color: var(--paper); border: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; box-shadow: 0 2px 6px rgba(20,25,42,0.15); cursor: pointer; }
.obj-handle button:hover { background: var(--c-coral-d); }
.obj-handle button[data-action="grab"] { cursor: grab; }

.section-head { grid-column: 1 / -1; display: flex; align-items: baseline; gap: 16px; margin: 24px 0 4px; }
.section-head:first-child { margin-top: 0; }
.section-head .num { display: inline-flex; align-items: center; justify-content: center; padding: 5px 12px; background: var(--c-butter); border-radius: 999px; font-family: var(--ff-display); font-weight: 700; font-size: 14px; color: var(--ink); font-variant-numeric: tabular-nums; }
.section-head .title { font-family: var(--ff-display); font-weight: 700; font-size: 36px; letter-spacing: -0.025em; line-height: 1.3; margin: 0; flex: 0 0 auto; }
.section-head .eyebrow { font-size: 14px; letter-spacing: 0.02em; color: var(--ink-soft); font-weight: 600; margin-left: auto; text-transform: none; }

.card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 22px 24px; display: flex; flex-direction: column; gap: 4px; height: 100%; position: relative; overflow: hidden; isolation: isolate; }
.card.kpi { border: 0; min-height: 200px; padding: 22px 24px; }
.card.kpi.compact { min-height: 168px; padding: 18px 20px; }
.card.c-sage     { background: var(--c-sage); }
.card.c-peach    { background: var(--c-peach); }
.card.c-butter   { background: var(--c-butter); }
.card.c-pink     { background: var(--c-pink); }
.card.c-lavender { background: var(--c-lavender); }
.card.c-mint     { background: var(--c-mint); }
.card.c-sky      { background: var(--c-sky); }
.card.c-cream    { background: var(--c-cream); }
.card.c-coral    { background: var(--c-coral); }
.card.c-ink      { background: var(--ink); color: var(--paper); }
.card .arr-btn { position: absolute; top: 18px; right: 18px; width: 36px; height: 36px; border-radius: 50%; background: var(--paper); color: var(--ink); display: grid; place-items: center; font-size: 16px; font-weight: 600; box-shadow: 0 1px 0 rgba(20,25,42,0.04); border: 0; cursor: pointer; transition: all 0.12s ease; z-index: 2; }
.card .arr-btn:hover { background: var(--ink); color: var(--paper); }
.card.c-ink .arr-btn { background: rgba(255,255,255,0.15); color: var(--paper); }
.card.c-ink .arr-btn:hover { background: var(--paper); color: var(--ink); }
.card.compact .arr-btn { width: 32px; height: 32px; font-size: 14px; top: 14px; right: 14px; }
.kpi-status { position: absolute; top: 24px; left: 24px; width: 10px; height: 10px; border-radius: 50%; display: none; }
.kpi-title { font-family: var(--ff-display); font-size: 19px; font-weight: 700; color: var(--ink); line-height: 1.35; letter-spacing: -0.005em; padding-right: 50px; }
.card.c-ink .kpi-title { color: var(--paper); }
.kpi-sub { font-family: var(--ff-body); font-size: 14px; color: var(--ink-2); opacity: 0.7; font-weight: 500; letter-spacing: 0.005em; }
.card.c-ink .kpi-sub { color: var(--paper); opacity: 0.65; }
.kpi-value-row { display: flex; align-items: baseline; gap: 6px; margin-top: auto; padding-top: 16px; white-space: nowrap; }
.kpi-value { font-family: var(--ff-display); font-weight: 800; font-size: 48px; line-height: 0.95; letter-spacing: -0.035em; color: var(--ink); font-variant-numeric: tabular-nums; }
.card.c-ink .kpi-value { color: var(--paper); }
.kpi-value.status-green, .kpi-value.status-red { color: var(--ink); }
.kpi-unit { font-family: var(--ff-display); font-size: 17px; font-weight: 600; color: var(--ink-2); opacity: 0.85; white-space: nowrap; }
.card.c-ink .kpi-unit { color: var(--paper); opacity: 0.85; }
.kpi-pct-sign { font-family: var(--ff-display); font-size: 24px; font-weight: 700; color: var(--ink-2); opacity: 0.85; }
.card.c-ink .kpi-pct-sign { color: var(--paper); opacity: 0.85; }
.card.compact .kpi-value { font-size: 38px; }
.card.compact .kpi-pct-sign { font-size: 20px; }
.card.compact .kpi-unit { font-size: 15px; }
.kpi-bar { height: 8px; background: rgba(20,25,42,0.1); border-radius: 4px; margin-top: 12px; overflow: hidden; position: relative; }
.card.c-ink .kpi-bar { background: rgba(255,255,255,0.15); }
.kpi-bar-fill { height: 100%; background: var(--ink); border-radius: 4px; transition: width 0.6s ease; }
.kpi-bar-fill.status-green { background: var(--ok); }
.kpi-bar-fill.status-red   { background: var(--warn); }
.card.c-ink .kpi-bar-fill { background: var(--paper); }
.card.c-ink .kpi-bar-fill.status-green { background: var(--c-mint); }
.card.c-ink .kpi-bar-fill.status-red   { background: var(--c-coral); }
.kpi-bar-target { display: none; }
.kpi-foot { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1.5px solid rgba(20,25,42,0.08); font-size: 12.5px; color: var(--ink-2); }
.card.c-ink .kpi-foot { border-top-color: rgba(255,255,255,0.15); color: var(--paper); }
.kpi-target { font-weight: 600; opacity: 0.78; }
.kpi-target b { font-weight: 800; opacity: 1; }
.kpi-trend { margin-left: auto; display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-family: var(--ff-display); font-weight: 700; font-size: 12px; background: var(--paper); color: var(--ink); font-variant-numeric: tabular-nums; }
.kpi-trend.up   { color: var(--ok); }
.kpi-trend.down { color: var(--warn); }
.kpi-trend.flat { color: var(--ink-soft); }
.card.c-ink .kpi-trend { background: rgba(255,255,255,0.15); color: var(--paper); }
.card.c-ink .kpi-trend.up   { color: var(--c-mint); }
.card.c-ink .kpi-trend.down { color: var(--c-coral); }
.kpi-dir-toggle { background: rgba(255,255,255,0.5); color: var(--ink-2); font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: 0.03em; cursor: pointer; transition: all 0.12s ease; border: 0; }
.kpi-dir-toggle:hover { background: var(--ink); color: var(--paper); }
.card.c-ink .kpi-dir-toggle { background: rgba(255,255,255,0.15); color: var(--paper); }

.card.kpi-project { padding: 22px 24px 20px; min-height: 188px; gap: 6px; background: var(--paper); }
.card.kpi-project.status-green { background: var(--c-sage); }
.card.kpi-project.status-red   { background: var(--c-coral); }
.card.kpi-project.compact { min-height: 164px; padding: 18px 20px; }
.kp-type { font-family: var(--ff-body); font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-2); opacity: 0.72; line-height: 1.2; margin-bottom: 2px; }
.kp-name { font-family: var(--ff-display); font-size: 19px; font-weight: 700; line-height: 1.38; letter-spacing: -0.008em; color: var(--ink); margin: 0; padding: 2px 4px 2px 0; }
.card.kpi-project.compact .kp-name { font-size: 17px; }
.card.kpi-project.clickable { cursor: pointer; }
.card.kpi-project.clickable:hover { filter: brightness(0.97); }
.card.kpi-project .kpi-value-row { padding-top: 12px; align-items: center; gap: 6px; flex-wrap: wrap; }

.text-block { background: var(--paper); padding: 26px 30px; border: 1.5px solid var(--line); border-left: 6px solid var(--c-butter-d); border-radius: var(--r); height: 100%; }
.text-block h3 { font-family: var(--ff-display); font-size: 24px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.015em; color: var(--ink); }
.text-block .body { font-size: 17px; line-height: 1.6; color: var(--ink-2); white-space: pre-wrap; text-wrap: pretty; }

.img-slot { background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.5) 0%, transparent 40%), radial-gradient(circle at 80% 20%, rgba(20,25,42,0.06) 0%, transparent 50%), var(--c-peach); border: 0; border-radius: var(--r); min-height: 300px; display: grid; place-items: center; padding: 24px; position: relative; height: 100%; }
.img-slot .img-label { font-family: var(--ff-body); font-size: 13px; font-weight: 600; letter-spacing: 0.01em; color: var(--ink); text-align: center; background: var(--paper); padding: 10px 18px; border-radius: 999px; box-shadow: 0 4px 16px rgba(20,25,42,0.08); }

.img-text { display: grid; grid-template-columns: 5fr 7fr; gap: 0; background: var(--paper); border: 0; border-radius: var(--r-xl); min-height: 340px; overflow: hidden; }
.img-text .img-slot { border: 0; border-radius: 0; min-height: auto; }
.img-text .it-body { padding: 36px 42px; display: flex; flex-direction: column; justify-content: center; }
.img-text .it-eyebrow { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(20,25,42,0.08); border-radius: 999px; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; width: fit-content; color: var(--ink-2); margin-bottom: 16px; }
.img-text h3 { font-family: var(--ff-display); font-size: 32px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.3; margin: 0 0 14px; color: var(--ink); }
.img-text .body { font-size: 17px; line-height: 1.55; color: var(--ink-2); white-space: pre-wrap; text-wrap: pretty; }

.pic-spread { background: var(--paper); border-radius: var(--r-xl); padding: 36px 40px; display: flex; flex-direction: column; gap: 22px; border: 1px solid var(--line); position: relative; }
.ps-top { display: grid; grid-template-columns: 4fr 8fr; gap: 28px; align-items: stretch; min-height: 340px; }
.pic-spread.side-right .ps-top { grid-template-columns: 8fr 4fr; }
.ps-portrait { background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.5) 0%, transparent 45%), radial-gradient(circle at 70% 25%, rgba(20,25,42,0.06) 0%, transparent 50%), var(--c-sky); border-radius: var(--r-lg); display: grid; place-items: center; min-height: 340px; position: relative; }
.ps-portrait .img-label { background: var(--paper); padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: 0.01em; }
.ps-body { display: flex; flex-direction: column; justify-content: center; padding: 8px 0; }
.ps-heading { font-family: var(--ff-display); font-size: 36px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.25; margin: 0 0 16px; color: var(--ink); }
.ps-text { font-family: var(--ff-body); font-size: 17px; line-height: 1.6; color: var(--ink-2); white-space: pre-wrap; text-wrap: pretty; }
.ps-landscape-row { display: grid; gap: 14px; grid-template-columns: repeat(var(--ps-cols, 4), 1fr); }
.ps-landscape-row[data-count="2"] { --ps-cols: 2; }
.ps-landscape-row[data-count="3"] { --ps-cols: 3; }
.ps-landscape-row[data-count="4"] { --ps-cols: 4; }
.ps-landscape-row[data-count="5"] { --ps-cols: 5; }
.ps-landscape-row[data-count="6"] { --ps-cols: 6; }
.ps-landscape { position: relative; background: radial-gradient(circle at 25% 80%, rgba(255,255,255,0.5) 0%, transparent 45%), var(--c-mint); border-radius: var(--r); aspect-ratio: 4 / 3; display: grid; place-items: center; transition: transform 0.12s ease; }

.ps-l-add:hover { border-color: var(--ink); color: var(--ink); }
.ps-controls { display: flex; justify-content: flex-end; margin-top: -8px; }

.img-full { display: flex; flex-direction: column; gap: 14px; }
.img-full-slot { background: radial-gradient(circle at 22% 78%, rgba(255,255,255,0.5) 0%, transparent 50%), radial-gradient(circle at 78% 22%, rgba(20,25,42,0.08) 0%, transparent 55%), var(--c-sage); border-radius: var(--r-xl); min-height: 720px; display: grid; place-items: center; position: relative; overflow: hidden; }

.img-full-caption { font-family: var(--ff-body); font-size: 14px; font-weight: 500; color: var(--ink-soft); text-align: center; line-height: 1.5; padding: 0 20px; }

.data-table { background: var(--paper); border-radius: var(--r-lg); padding: 28px 32px 24px; border: 1px solid var(--line); display: flex; flex-direction: column; gap: 16px; }
.dt-title { font-family: var(--ff-display); font-size: 22px; font-weight: 700; line-height: 1.3; margin: 0; color: var(--ink); letter-spacing: -0.015em; }
.dt-scroll { overflow-x: auto; }

.dt-col-label { font-weight: 500; min-width: 240px; }
.dt-col-num { text-align: right; font-family: var(--ff-display); font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
.dt-actions-col { width: 36px; padding: 0 !important; background: transparent !important; border-bottom-color: transparent !important; }
.dt-row-del { width: 24px; height: 24px; border-radius: 50%; background: var(--paper); border: 1px solid var(--line); color: var(--ink-soft); font-size: 12px; font-weight: 700; cursor: pointer; display: grid; place-items: center; opacity: 0; transition: all 0.14s ease; }

.dt-add-row { align-self: flex-start; margin-top: 4px; padding: 8px 16px; border-radius: 999px; background: transparent; border: 1.5px dashed rgba(20,25,42,0.25); font-family: var(--ff-body); font-weight: 700; font-size: 13px; color: var(--ink-soft); cursor: pointer; transition: all 0.12s ease; }
.dt-add-row:hover { background: var(--ink); color: var(--paper); border-style: solid; border-color: var(--ink); }

.timeline { background: var(--paper); border: 1.5px solid var(--line); border-radius: var(--r-lg); padding: 28px 30px; }
.timeline-title { font-family: var(--ff-display); font-size: 24px; font-weight: 700; margin: 0 0 20px; letter-spacing: -0.015em; }
.tl-rows { display: flex; flex-direction: column; gap: 14px; }
.tl-row { display: grid; grid-template-columns: 240px 1fr; gap: 18px; align-items: stretch; background: var(--c-cream); border-radius: var(--r); padding: 16px 18px 16px 20px; position: relative; }
.tl-row-label { display: flex; flex-direction: column; justify-content: center; gap: 4px; border-right: 1.5px dashed rgba(20,25,42,0.12); padding-right: 16px; }

.tl-blocks { display: flex; align-items: stretch; gap: 0; flex-wrap: wrap; row-gap: 12px; }
.tl-block-wrap { display: flex; align-items: center; }
.tl-connector { width: 18px; height: 2px; background: rgba(20,25,42,0.15); flex-shrink: 0; }
.tl-block { position: relative; min-width: 210px; max-width: 280px; flex: 0 0 auto; background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 13px 16px 14px 22px; display: flex; flex-direction: column; gap: 6px; transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease; overflow: visible; }
.tl-block:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(20,25,42,0.06); }

.tl-block.red { border-color: rgba(181,55,55,0.18); }
.tl-block.red::before { background: var(--warn); }

.tl-block-period { font-family: var(--ff-body); font-size: 11.5px; color: var(--ink-soft); font-weight: 500; letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 6px; }
.tl-block-period::before { content: "◇"; font-size: 9px; opacity: 0.55; }

.tl-block-progbar > div { height: 100%; background: var(--ink); border-radius: 999px; transition: width 0.5s ease; }

.tl-block.red   .tl-block-progbar > div { background: var(--warn); }

.tl-block-actions { position: absolute; top: 7px; right: 7px; display: flex; gap: 4px; opacity: 0; transform: translateY(-2px); transition: opacity 0.14s ease, transform 0.14s ease; z-index: 2; }
.tl-row.editable .tl-block:hover .tl-block-actions, .tl-row.editable .tl-block:focus-within .tl-block-actions { opacity: 1; transform: translateY(0); }
.tl-block-actions button { width: 24px; height: 24px; border-radius: 50%; background: var(--paper); border: 1px solid var(--line); color: var(--ink-2); font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; box-shadow: 0 2px 6px rgba(20,25,42,0.08); transition: all 0.12s ease; }
.tl-block-actions button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); transform: scale(1.08); }
.tl-add { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: transparent; border: 1.5px dashed var(--ink-soft); color: var(--ink-soft); font-family: var(--ff-body); font-weight: 600; font-size: 13px; border-radius: var(--r); cursor: pointer; padding: 10px 14px; transition: all 0.12s ease; min-height: 70px; }
.tl-add:hover { border-color: var(--ink); color: var(--ink); background: rgba(20,25,42,0.03); }
.tl-add.right { min-width: 90px; align-self: stretch; }
.tl-add.down { width: 100%; margin-top: 14px; padding: 14px; min-height: 56px; }
.tl-row-del { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border: 0; border-radius: 8px; background: transparent; color: var(--ink-soft); cursor: pointer; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.12s ease; }
.tl-row:hover .tl-row-del { opacity: 1; }
.tl-row-del:hover { background: var(--warn-soft); color: var(--warn); }

.chart-wrap { background: var(--c-cream); border: 0; border-radius: var(--r-xl); padding: 32px 36px 28px; }
.chart-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 22px; }
.chart-head .ch-title { font-family: var(--ff-display); font-size: 24px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.015em; line-height: 1.2; color: var(--ink); }
.chart-head .ch-sub { font-size: 14px; color: var(--ink-soft); letter-spacing: 0.005em; }
.chart-legend { display: flex; gap: 12px; font-size: 13px; font-weight: 600; color: var(--ink-2); align-items: center; flex-wrap: wrap; }
.chart-legend .lg-pill { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px 6px 8px; background: var(--paper); border-radius: 999px; }
.chart-legend .lg-pill .lg-mark { width: 12px; height: 12px; border-radius: 4px; display: inline-block; }
.chart-legend .lg-pill .lg-mark.dot { border-radius: 50%; }
.chart-svg-wrap { padding-top: 0; }
.cpa-edit { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 18px; }
.cpa-refs { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; font-size: 14px; font-weight: 600; flex-wrap: wrap; }
.cpa-ref-val { min-width: 80px; text-align: right; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; background: var(--paper); }
.cpa-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 8px; }
.cpa-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.cpa-month { color: var(--ink-soft); font-weight: 600; font-size: 11px; }
.cpa-bar-val { width: 100%; text-align: center; border: 1px solid var(--border); border-radius: 6px; padding: 4px 2px; font-size: 12px; min-height: 26px; }

.present-overlay { position: fixed; inset: 0; background: var(--ink); z-index: 1000; display: flex; flex-direction: column; }
.present-bar { display: flex; justify-content: space-between; align-items: center; padding: 18px 32px; color: var(--paper); border-bottom: 1px solid rgba(255,255,255,0.08); }
.present-bar .left { display: flex; align-items: baseline; gap: 18px; }
.pb-eyebrow { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--c-butter); font-weight: 700; }
.pb-title { font-family: var(--ff-display); font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
.pb-count { font-size: 13px; color: rgba(255,255,255,0.6); font-family: var(--ff-display); font-weight: 600; }
.present-bar .right { display: flex; align-items: center; gap: 8px; }
.p-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--paper); padding: 9px 16px; font-weight: 600; font-size: 14px; font-family: var(--ff-body); border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
.p-btn:hover { background: rgba(255,255,255,0.1); }
.p-btn.primary { background: var(--c-butter); color: var(--ink); border-color: var(--c-butter); }
.p-btn.primary:hover { background: var(--paper); }
.present-body { flex: 1; display: grid; grid-template-columns: 320px 1fr; min-height: 0; }
.present-playlist { background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.08); padding: 24px 16px; overflow-y: auto; color: var(--paper); }
.present-playlist h4 { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 700; margin: 0 0 14px; padding: 0 8px; }
.pl-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 14px; cursor: pointer; color: rgba(255,255,255,0.85); user-select: none; border: 1px solid transparent; margin-bottom: 4px; }
.pl-item:hover { background: rgba(255,255,255,0.05); }
.pl-item.active { background: rgba(251, 229, 164, 0.16); color: var(--c-butter); border-color: rgba(251, 229, 164, 0.35); }
.pl-item.dragging { opacity: 0.4; }
.pl-item .pl-num { width: 28px; font-family: var(--ff-display); font-weight: 700; font-size: 15px; color: var(--c-butter); text-align: center; font-variant-numeric: tabular-nums; }
.pl-item .pl-meta { flex: 1; min-width: 0; }
.pl-item .pl-mt { font-size: 10.5px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
.pl-item .pl-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
.pl-item .pl-grab { color: rgba(255,255,255,0.3); cursor: grab; }
.pl-item .pl-remove { background: transparent; color: rgba(255,255,255,0.4); font-size: 16px; }
.pl-item .pl-remove:hover { color: var(--c-coral); }
.present-stage { overflow-y: auto; padding: 32px; display: flex; justify-content: center; }
.present-stage-inner { width: 100%; max-width: 1680px; background: var(--paper); padding: 48px 56px 72px; color: var(--ink); min-height: calc(100vh - 130px); border-radius: var(--r-xl); }
.present-eyebrow { display: flex; align-items: baseline; gap: 18px; padding-bottom: 14px; border-bottom: 2px solid var(--ink); margin-bottom: 28px; }
.pe-num { font-family: var(--ff-display); font-weight: 800; font-size: 18px; color: var(--c-butter-d); font-variant-numeric: tabular-nums; }
.pe-mt { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); font-weight: 700; }
.pe-title { font-family: var(--ff-display); font-size: 38px; font-weight: 700; margin-left: auto; margin-right: 0; color: var(--ink); letter-spacing: -0.02em; }

.present-overlay.fullscreen { background: var(--ink); cursor: default; }
.present-overlay.chrome-off { cursor: none; }
.present-overlay.chrome-off .present-topbar, .present-overlay.chrome-off .present-progress { opacity: 0; transform: translateY(-6px); pointer-events: none; }
.present-overlay.chrome-off .present-progress { transform: translateY(6px); }
.present-topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1010; display: flex; justify-content: space-between; align-items: center; padding: 14px 26px; background: linear-gradient(180deg, rgba(20,25,42,0.78), rgba(20,25,42,0)); color: var(--paper); transition: opacity 0.25s ease, transform 0.25s ease; }
.ptb-left { display: inline-flex; align-items: baseline; gap: 12px; font-family: var(--ff-display); }

.ptb-sep { color: rgba(255,255,255,0.4); }
.ptb-name { font-size: 18px; font-weight: 700; color: var(--paper); }
.ptb-right { display: inline-flex; align-items: center; gap: 8px; }
.ptb-count { font-family: var(--ff-display); font-weight: 700; font-size: 13px; color: rgba(255,255,255,0.75); padding: 0 8px; font-variant-numeric: tabular-nums; }
.present-stage.full { flex: 1; overflow-y: auto; padding: 0; background: var(--paper); }
.present-stage.full .present-stage-inner { width: 100%; max-width: none; background: var(--paper); padding: 56px 64px 96px; min-height: 100vh; border-radius: 0; }
.present-progress { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 1010; display: flex; align-items: center; gap: 14px; padding: 10px 18px; background: rgba(20,25,42,0.72); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-radius: 999px; transition: opacity 0.25s ease, transform 0.25s ease; }
.pp-track { display: flex; align-items: center; gap: 7px; max-width: 60vw; flex-wrap: wrap; justify-content: center; }
.pp-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.28); border: 0; cursor: pointer; padding: 0; transition: all 0.18s ease; }
.pp-dot:hover { background: rgba(255,255,255,0.55); transform: scale(1.18); }
.pp-dot.done { background: rgba(255,255,255,0.55); }
.pp-dot.active { background: var(--c-butter); width: 28px; border-radius: 999px; box-shadow: 0 0 0 3px rgba(251,229,164,0.18); }
.pp-label { font-family: var(--ff-display); font-weight: 700; font-size: 13px; color: var(--paper); font-variant-numeric: tabular-nums; padding-left: 4px; border-left: 1px solid rgba(255,255,255,0.18); margin-left: 4px; padding: 0 0 0 14px; }

.present-picker { flex: 1; display: flex; overflow: hidden; }
.pp-left { flex: 1; padding: 32px 40px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.08); }
.pp-left h2 { font-family: var(--ff-display); font-size: 20px; font-weight: 700; color: var(--paper); margin-bottom: 8px; }
.pp-intro { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 32px; line-height: 1.5; }
.pp-section { margin-bottom: 28px; }
.pp-section h3 { font-family: var(--ff-display); font-size: 13px; font-weight: 700; color: var(--c-butter); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: baseline; gap: 10px; }
.pp-full { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.4); text-transform: none; letter-spacing: 0; }
.pp-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.pp-chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; font-family: var(--ff-body); transition: all 0.14s ease; }
.pp-chip:hover { background: rgba(255,255,255,0.12); color: var(--paper); }
.pp-chip.selected { background: rgba(251,229,164,0.18); border-color: rgba(251,229,164,0.5); color: var(--c-butter); font-weight: 600; }
.pp-tick { font-size: 11px; }
.pp-right { width: 320px; padding: 24px; overflow-y: auto; background: rgba(0,0,0,0.12); }
.pp-right h3 { font-family: var(--ff-display); font-size: 14px; font-weight: 700; color: var(--paper); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.pp-right h3 span { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.45); }
.pp-list { display: flex; flex-direction: column; }
.pp-empty { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); font-size: 13px; line-height: 2; }

.dialog-backdrop { position: fixed; inset: 0; background: rgba(20,25,42,0.45); z-index: 800; display: grid; place-items: center; }
.dialog { background: var(--paper); border-radius: var(--r-xl); padding: 36px 40px; width: 520px; max-width: 92vw; border-top: 6px solid var(--c-butter-d); }
.dialog h3 { font-family: var(--ff-display); font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 8px; }
.dialog p { color: var(--ink-soft); font-size: 14px; margin: 0 0 22px; }
.dialog input[type="text"] { width: 100%; padding: 14px 16px; border: 1.5px solid var(--line); border-radius: var(--r-sm); background: var(--paper-2); font-size: 15px; font-family: var(--ff-body); margin-bottom: 18px; }
.dialog input[type="text"]:focus { outline: 2px solid var(--c-butter-d); border-color: var(--c-butter-d); }
.dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }
.version-list { max-height: 360px; overflow-y: auto; border: 1.5px solid var(--line); border-radius: var(--r-sm); margin-bottom: 20px; }
.version-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line-soft); cursor: pointer; }
.version-item:last-child { border-bottom: 0; }
.version-item:hover { background: var(--paper-2); }
.version-item .vi-name { font-weight: 600; flex: 1; }
.version-item .vi-when { font-size: 12px; color: var(--ink-soft); font-family: var(--ff-display); font-weight: 600; letter-spacing: 0.02em; }

  <script>
// ══════════════════════════════════════════════════════════════
//  ApiService — Google Apps Script backend (no user login needed)
//  ตั้งค่า: วาง URL ของ GAS Web App ที่ deploy แล้วด้านล่าง
// ══════════════════════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbz_9lXJ_0_C1MCS0pFS90_i5sTwSXubIrAyx25kh0EyvUfUih98OCXxcFOnIl0Hufup/exec";

window.__imgCache = {};
window.ApiService = (() => {
  async function get(params) {
    if (!GAS_URL || GAS_URL === "YOUR_GAS_URL_HERE") throw new Error("ยังไม่ได้ตั้งค่า GAS_URL");
    const url = GAS_URL + "?" + new URLSearchParams(params);
    const resp = await fetch(url, { redirect: "follow" });
    if (!resp.ok) throw new Error("API " + resp.status);
    const result = await resp.json();
    if (result && result.error) throw new Error(result.error);
    return result;
  }
  // POST ใช้ no-cors เพื่อให้ทำงานได้จาก file:// โดยไม่ติด CORS
  // request ถึง GAS เสมอ แต่ไม่สามารถอ่าน response ได้ (ยอมรับได้สำหรับ save)
  async function post(data) {
    if (!GAS_URL || GAS_URL === "YOUR_GAS_URL_HERE") throw new Error("ยังไม่ได้ตั้งค่า GAS_URL");
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(data),
    });
    return { ok: true };
  }
  return {
    isConfigured() { return !!(GAS_URL && GAS_URL !== "YOUR_GAS_URL_HERE"); },
    async loadAll() { return get({ action: "loadAll" }); },
    async saveDivision(divId, tab, meta, password) {
      return post({ action: "save", divId, tab, meta, password });
    },
    async saveVersion(divId, versionName, tab, meta, password) {
      return post({ action: "saveVersion", divId, versionName, tab, meta, password });
    },
    async uploadImage(divId, imageData, password) {
      const imageId = Date.now().toString(36) + Math.random().toString(36).slice(2);
      await post({ action: "uploadImage", divId, imageId, imageData, password });
      const result = await get({ action: "getImageUrl", divId, imageId });
      if (!result || !result.url) throw new Error("ไม่พบไฟล์หลังอัพโหลด");
      return result.url;
    },
  };
})();
  </script>

  <script type="text/babel" data-presets="react">
const { useMemo } = React;
function Chart({ months, bars, line, barLabel, lineLabel, format }) {
  const W = 1100, H = 360;
  const pad = { t: 24, r: 32, b: 56, l: 76 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const maxRaw = Math.max(...bars, ...line);
  const max = niceCeil(maxRaw * 1.15);
  const yTicks = 5;
  const stepY = max / yTicks;
  const n = months.length;
  const colW = innerW / n;
  const barW = Math.min(48, colW * 0.42);
  const fmt = format || defaultFormat;
  const xFor = (i) => pad.l + colW * i + colW / 2;
  const yFor = (v) => pad.t + innerH - (v / max) * innerH;
  const pathD = useMemo(() => line.map((v, i) => `${i === 0 ? "M" : "L"} ${xFor(i)} ${yFor(v)}`).join(" "), [line, months]);
  return (
    <div className="chart-svg-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {Array.from({ length: yTicks + 1 }).map((_, i) => {
          const v = stepY * i; const y = yFor(v);
          return (<g key={`gy-${i}`}>
            <line x1={pad.l} x2={W - pad.r} y1={y} y2={y} stroke={i === 0 ? "#15192a" : "#ece5d5"} strokeWidth={i === 0 ? 1.5 : 1} strokeDasharray={i === 0 ? "0" : "2 4"} />
            <text x={pad.l - 12} y={y + 5} textAnchor="end" fontFamily="Sora, Bai Jamjuree, system-ui" fontSize="13" fontWeight="500" fill="#6c7282">{fmt(v)}</text>
          </g>);
        })}
        {bars.map((v, i) => {
          const x = xFor(i) - barW / 2; const y = yFor(v); const h = pad.t + innerH - y;
          const isAhead = v >= line[i];
          return (<g key={`b-${i}`}>
            <rect x={x} y={y} width={barW} height={h} rx="10" fill={isAhead ? "#88a376" : "#b53737"} opacity={isAhead ? 1 : 0.92} />
            <text x={xFor(i)} y={y - 10} textAnchor="middle" fontFamily="Sora, system-ui" fontSize="15" fontWeight="700" fill="#15192a">{fmt(v)}</text>
          </g>);
        })}
        <path d={pathD} fill="none" stroke="#b5703f" strokeWidth="2.5" strokeDasharray="6 5" />
        {line.map((v, i) => <g key={`d-${i}`}><circle cx={xFor(i)} cy={yFor(v)} r="6" fill="#f7d4bc" stroke="#b5703f" strokeWidth="2.5" /></g>)}
        {months.map((m, i) => <text key={`x-${i}`} x={xFor(i)} y={H - pad.b + 28} textAnchor="middle" fontFamily="Bai Jamjuree, system-ui" fontSize="15" fontWeight="600" fill="#2a2f44">{m}</text>)}
      </svg>
    </div>
  );
}
function niceCeil(v) { if (v <= 0) return 10; const pow = Math.pow(10, Math.floor(Math.log10(v))); const n = v / pow; let mult; if (n <= 1) mult = 1; else if (n <= 2) mult = 2; else if (n <= 2.5) mult = 2.5; else if (n <= 5) mult = 5; else mult = 10; return mult * pow; }
function defaultFormat(v) { if (v === 0) return "0"; if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(v % 1e6 === 0 ? 0 : 1) + "M"; if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(v % 1e3 === 0 ? 0 : 1) + "K"; return String(v); }
window.Chart = Chart;
  </script>

async function compressImage(file, maxW = 1200, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

      DIVISIONS.forEach(div => {
        const d = all[div.id];
        if (d && d.tab) dispatch({ type: "SET_DIVISION_TAB", tabIdx: div.tabIdx, tab: d.tab });
      });
    }).catch(() => {}).finally(() => setApiLoading(false));
  }, []);

  const showToast = (msg, dur = 2200) => { setToast(msg); setTimeout(() => setToast(""), dur); };
  window.__showToast = showToast;

  const loadAllFromApi = async () => {
    try {
      const all = await window.ApiService.loadAll();
      let loaded = 0;
      DIVISIONS.forEach(div => {
        const d = all[div.id];
        if (d && d.tab) { dispatch({ type: "SET_DIVISION_TAB", tabIdx: div.tabIdx, tab: d.tab }); loaded++; }
      });
      showToast(loaded > 0 ? `โหลดจาก Drive สำเร็จ (${loaded} กอง)` : "ยังไม่มีข้อมูลบันทึก");
    } catch (err) { showToast("โหลดไม่สำเร็จ: " + (err.message || err)); }
  };

  // Auth
  const onAuthSuccess = (div, rawPassword) => {
    rawPasswordRef.current = rawPassword;
    window.__editDivId = div.id;
    window.__editPassword = rawPassword;
    setActiveDivision(div);
    setAuthModalOpen(false);
    const tab = state.mainTabs[div.tabIdx];
    if (tab) dispatch({ type: "SET_MAIN_TAB", id: tab.id });
    showToast(`ปลดล็อก ${div.short} — พร้อมแก้ไข`);
  };
  const onToggleEdit = (want) => {
    if (!want) { setActiveDivision(null); rawPasswordRef.current = null; window.__editDivId = null; window.__editPassword = null; return; }
    setAuthModalOpen(true);
  };

  // Save
  const onSave = async () => {
    if (!activeDivision) { showToast("กรุณาปลดล็อกกองก่อนบันทึก"); return; }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const api = window.ApiService;
    if (!api || !api.isConfigured()) { showToast("บันทึก local แล้ว · ยังไม่ได้ตั้งค่า GAS_URL"); return; }
    setSyncStatus("saving");
    try {
      const tab = state.mainTabs[activeDivision.tabIdx];
      await api.saveDivision(activeDivision.id, tab, state.meta, rawPasswordRef.current);
      setSyncStatus("saved");
      showToast(`บันทึก ${activeDivision.short} สำเร็จ`);
      setTimeout(() => setSyncStatus("idle"), 3000);
    } catch (err) {
      setSyncStatus("error");
      showToast("บันทึกไม่สำเร็จ: " + (err.message || err));
      setTimeout(() => setSyncStatus("idle"), 4000);
    }
  };
  const onSaveAs = async (name) => {
    const arr = loadVersions();
    arr.unshift({ id: window.__uid("ver"), name, ts: Date.now(), divisionId: activeDivision?.id, state: deepClone(state) });
    saveVersions(arr); setVersions(arr); setSaveAsOpen(false);
    const api = window.ApiService;
    if (api && api.isConfigured() && activeDivision) {
      try {
        const tab = state.mainTabs[activeDivision.tabIdx];
        await api.saveVersion(activeDivision.id, name, tab, state.meta, rawPasswordRef.current);
        showToast(`บันทึก "${name}" สำเร็จ`);
      } catch (err) { showToast(`บันทึก local แล้ว · API: ${err.message}`); }
    } else { showToast(`บันทึก "${name}" local แล้ว`); }
  };

  const onLoadVersion = (v) => { dispatch({ type: "LOAD_STATE", state: deepClone(v.state) }); setVersionsOpen(false); showToast(`โหลด "${v.name}"`); };
  const onDeleteVersion = (id) => { const arr = loadVersions().filter((v) => v.id !== id); saveVersions(arr); setVersions(arr); };
  const onExport = () => {
    try {
      const payload = { kind: "monthly-report-export", version: 2, exportedAt: new Date().toISOString(), state, versions: loadVersions() };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); const stamp = new Date().toISOString().slice(0, 10);
      a.href = url; a.download = `MonthlyReport_${stamp}.json`;
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      showToast("Export JSON สำเร็จ");
    } catch (e) { showToast("Export ไม่สำเร็จ"); }
  };
  const onImport = () => {
    const input = document.createElement("input");
    input.type = "file"; input.accept = "application/json,.json";
    input.onchange = (e) => {
      const f = e.target.files && e.target.files[0]; if (!f) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          const incomingState = data.state || data;
          if (!incomingState || !incomingState.mainTabs) { showToast("ไฟล์ไม่ถูกต้อง"); return; }
          if (!confirm("Import จะทับงานปัจจุบัน — แน่ใจไหม?")) return;
          dispatch({ type: "LOAD_STATE", state: deepClone(incomingState) });
          if (Array.isArray(data.versions)) { saveVersions(data.versions); setVersions(data.versions); }
          showToast("Import สำเร็จ");
        } catch (err) { showToast("อ่านไฟล์ไม่ได้"); }
      };
      reader.readAsText(f);
    };
    input.click();
  };

  const activeMain = state.mainTabs.find((m) => m.id === state.activeMainTab);
  const activeSubId = state.activeSubByMain[state.activeMainTab];
  const activeSub = activeMain && activeMain.subTabs.find((s) => s.id === activeSubId);

  return (<>
    {apiLoading && (
      <div className="splash-backdrop">
        <div className="splash-card">
          <div className="splash-logo">MR</div>
          <div className="splash-title">กำลังโหลด…</div>
          <div className="splash-sub">กำลังดึงข้อมูลจาก Google Drive</div>
        </div>
      </div>
    )}
    <div className="app">
      <div className="stage">
        <header className="topbar">
          <div className="brand">
            <div className="brand-logo">อสค</div>
            <div className="brand-meta">
              <div className="b1">{state.meta.company}</div>
              <div className="b2">{state.meta.reportTitle}</div>
            </div>
          </div>
          <div className="topbar-spacer" />
          <div className="status-legend" title="กติกาสีของรายงาน">
            <span className="sl-item ok"><span className="sl-dot" />ตามแผน / เร็วกว่าแผน</span>
            <span className="sl-item warn"><span className="sl-dot" />ช้ากว่าแผน</span>
          </div>
          <div className="actions">
            {window.ApiService && window.ApiService.isConfigured()
              ? <span className={`drive-chip ${syncStatus === "saving" ? "saving" : syncStatus === "error" ? "error" : "connected"}`}>
                  {syncStatus === "saving" ? "⇋ บันทึก…" : syncStatus === "error" ? "! ไม่สำเร็จ" : "✓ Drive"}
                </span>
              : <span className="drive-chip">⇋ Drive (ยังไม่ตั้งค่า)</span>
            }
            <button className="btn" onClick={onSave} disabled={!activeDivision} style={!activeDivision ? { opacity: 0.4 } : {}} title="บันทึกกองที่กำลังแก้ไข"><Ico>⌬</Ico>บันทึก</button>
            {window.ApiService && window.ApiService.isConfigured() && <button className="btn" onClick={loadAllFromApi} title="โหลดข้อมูลล่าสุดจาก Drive ทุกกอง"><Ico>↺</Ico>โหลดจาก Drive</button>}
            <button className="btn" onClick={() => setSaveAsOpen(true)} disabled={!activeDivision} style={!activeDivision ? { opacity: 0.4 } : {}} title="บันทึกเป็นเวอร์ชัน"><Ico>+</Ico>บันทึกเป็น</button>
            <button className="btn" onClick={() => setVersionsOpen(true)} title="โหลดเวอร์ชัน"><Ico>↺</Ico>เวอร์ชัน</button>
            <button className="btn" onClick={onExport} title="Export JSON"><Ico>↓</Ico>Export</button>
            <button className="btn" onClick={onImport} title="Import JSON"><Ico>↑</Ico>Import</button>
            <button className="btn primary" onClick={() => setPresent("picker")} title="โหมดนำเสนอ">นำเสนอ<span className="arr">▶</span></button>
          </div>
        </header>
        <MainTabs tabs={state.mainTabs} activeId={state.activeMainTab} activeDivision={activeDivision} onSelect={(id) => dispatch({ type: "SET_MAIN_TAB", id })} />
        {activeMain && <SubTabs subTabs={activeMain.subTabs} activeId={activeSubId} onSelect={(id) => dispatch({ type: "SET_SUB_TAB", id })} dispatch={dispatch} editable={editable} />}
        <Toolbar dispatch={dispatch} editable={editable} activeDivision={activeDivision} onToggleEdit={onToggleEdit} />
        {activeSub && <Canvas subTab={activeSub} mainTab={activeMain} editable={editable} dispatch={dispatch} period={state.meta.period} divisionId={activeDivision?.id} />}
      </div>
    </div>
    {present === "picker" && <PresentationPicker state={state} onClose={() => setPresent(null)} onStart={(pl) => { setPlaylist(pl); setPresent("playing"); }} />}
    {present === "playing" && <PresentationView state={state} playlist={playlist} onClose={() => setPresent(null)} />}
    {saveAsOpen && <SaveAsDialog defaultName={`${state.meta.reportTitle} ${state.meta.period}${activeDivision ? " — " + activeDivision.short : ""}`} onSave={onSaveAs} onClose={() => setSaveAsOpen(false)} />}
    {versionsOpen && <VersionsDialog versions={versions} onLoad={onLoadVersion} onDelete={onDeleteVersion} onClose={() => setVersionsOpen(false)} />}
    {authModalOpen && <AuthModal onSuccess={onAuthSuccess} onClose={() => setAuthModalOpen(false)} />}
    <Toast msg={toast} />
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
